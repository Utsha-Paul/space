<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ultra Space Engine</title>

<style>
body { margin:0; overflow:hidden; background:black; color:white; font-family:sans-serif;}
#ui {
  position:absolute; top:20px; left:20px;
  background:rgba(0,0,0,0.6);
  padding:15px; border-radius:10px; width:260px;
}
select, button {
  width:100%; margin-top:8px; padding:6px;
}
#cockpit {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  width: 300px;
  height: 80px;
  border: 2px solid rgba(0,255,255,0.4);
  border-radius: 10px;
  pointer-events: none;
  display: none;
}
</style>
</head>

<body>

<div id="ui">
<h3>🚀 Ultra Space Engine</h3>

<select id="mode">
  <option value="planet">Planet</option>
  <option value="galaxy">Galaxy</option>
  <option value="blackhole">Black Hole</option>
</select>

<select id="planet">
  <option value="mercury">Mercury</option>
  <option value="venus">Venus</option>
  <option value="earth">Earth</option>
  <option value="mars">Mars</option>
  <option value="jupiter">Jupiter</option>
  <option value="saturn">Saturn</option>
  <option value="uranus">Uranus</option>
  <option value="neptune">Neptune</option>
</select>

<select id="render">
  <option value="mesh">Shader/Mesh</option>
  <option value="particles">Particles</option>
</select>

<button onclick="generate()">Generate</button>
<button onclick="toggleFP()">Spaceship Mode</button>
</div>

<div id="cockpit"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/controls/OrbitControls.js"></script>

<script>
let scene, camera, renderer, controls;
let object, stars;
let fp = false;

init(); animate();

function init(){
scene = new THREE.Scene();

camera = new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,5000);
camera.position.z = 15;

renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

controls = new THREE.OrbitControls(camera, renderer.domElement);

let light = new THREE.PointLight(0xffffff,2);
light.position.set(10,10,10);
scene.add(light);

createStars();
createMultipleGalaxies();
}

// ⭐ stars
function createStars(){
let geo=new THREE.BufferGeometry();
let pos=[];
for(let i=0;i<30000;i++){
pos.push(
(Math.random()-0.5)*4000,
(Math.random()-0.5)*4000,
(Math.random()-0.5)*4000
);
}
geo.setAttribute('position', new THREE.Float32BufferAttribute(pos,3));
stars=new THREE.Points(geo,new THREE.PointsMaterial({color:0xffffff,size:1}));
scene.add(stars);
}

// 🌌 multiple galaxies
function createMultipleGalaxies(){
for(let i=0;i<5;i++){
let g=createGalaxy();
g.position.set(
(Math.random()-0.5)*500,
(Math.random()-0.5)*200,
(Math.random()-0.5)*500
);
scene.add(g);
}
}

// 🌌 galaxy
function createGalaxy(){
let geo=new THREE.BufferGeometry();
let pos=[];
for(let i=0;i<20000;i++){
let r=Math.random()*10;
let angle=r*1.5;
pos.push(
Math.cos(angle)*r,
(Math.random()-0.5),
Math.sin(angle)*r
);
}
geo.setAttribute('position', new THREE.Float32BufferAttribute(pos,3));

return new THREE.Points(geo,new THREE.PointsMaterial({size:0.03}));
}

// 🪐 planets
function createPlanet(name, mode){
if(mode==="particles"){
let geo=new THREE.BufferGeometry();
let pos=[];
for(let i=0;i<8000;i++){
let t=Math.random()*Math.PI*2;
let p=Math.acos((Math.random()*2)-1);
pos.push(
2*Math.sin(p)*Math.cos(t),
2*Math.sin(p)*Math.sin(t),
2*Math.cos(p)
);
}
geo.setAttribute('position', new THREE.Float32BufferAttribute(pos,3));
return new THREE.Points(geo,new THREE.PointsMaterial({color:getColor(name),size:0.03}));
}

// mesh mode
let texLoader = new THREE.TextureLoader();
let texMap = {
earth:"https://threejs.org/examples/textures/earth_atmos_2048.jpg",
};

let mat = new THREE.MeshStandardMaterial({
color:getColor(name),
map: texMap[name] ? texLoader.load(texMap[name]) : null
});

let mesh = new THREE.Mesh(new THREE.SphereGeometry(2,64,64), mat);

// saturn ring
if(name==="saturn"){
let ring = new THREE.Mesh(
new THREE.RingGeometry(3,5,64),
new THREE.MeshBasicMaterial({color:0xffcc88,side:THREE.DoubleSide})
);
ring.rotation.x=Math.PI/2;
mesh.add(ring);
}

return mesh;
}

function getColor(n){
return {
mercury:0xaaaaaa, venus:0xffcc99, earth:0x2233ff,
mars:0xff3300, jupiter:0xff9966, saturn:0xffcc88,
uranus:0x66ffff, neptune:0x3366ff
}[n];
}

// 🕳️ black hole with distortion
function createBlackHole(){
let group=new THREE.Group();

let core=new THREE.Mesh(
new THREE.SphereGeometry(2,64,64),
new THREE.MeshBasicMaterial({color:0x000000})
);

group.add(core);

// distortion sphere
let distort=new THREE.Mesh(
new THREE.SphereGeometry(3,64,64),
new THREE.ShaderMaterial({
transparent:true,
blending:THREE.AdditiveBlending,
vertexShader:`void main(){
gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);
}`,
fragmentShader:`void main(){
gl_FragColor=vec4(0.2,0.2,1.0,0.1);
}`
})
);
group.add(distort);

// disk
let disk=new THREE.Mesh(
new THREE.RingGeometry(2.5,6,128),
new THREE.MeshBasicMaterial({color:0xff6600,side:THREE.DoubleSide})
);
disk.rotation.x=Math.PI/2;
group.add(disk);

return group;
}

// 🎮 spaceship
function toggleFP(){
fp=!fp;
controls.enabled=!fp;
document.getElementById("cockpit").style.display = fp ? "block" : "none";
}

document.addEventListener("keydown",e=>{
if(!fp) return;
let s=1;
if(e.key==="w") camera.position.z-=s;
if(e.key==="s") camera.position.z+=s;
if(e.key==="a") camera.position.x-=s;
if(e.key==="d") camera.position.x+=s;
});

// generate
function generate(){
if(object) scene.remove(object);

let mode=document.getElementById("mode").value;
let render=document.getElementById("render").value;

if(mode==="planet"){
object=createPlanet(document.getElementById("planet").value,render);
}
if(mode==="blackhole") object=createBlackHole();
if(mode==="galaxy") object=createGalaxy();

scene.add(object);
}

// animate
function animate(){
requestAnimationFrame(animate);

if(object) object.rotation.y+=0.002;

scene.traverse(o=>{
if(o instanceof THREE.Points) o.rotation.y+=0.0005;
});

controls.update();
renderer.render(scene,camera);
}

window.addEventListener("resize",()=>{
camera.aspect=innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth,innerHeight);
});
</script>

</body>
</html>
